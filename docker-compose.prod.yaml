services:
  backend:
    container_name: simple_blog_backend
    build:
      context: ./
      dockerfile: Dockerfile
    image: dandu-backend:latest
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    environment:
      DATABASE_URL: mysql://${DATABASE_USER:-dandu}:${DATABASE_PASSWORD:-dandu123}@mysql:3306/${DATABASE_NAME:-gandu}
      DATABASE_HOST: mysql
      DATABASE_PORT: ${DATABASE_PORT:-3306}
      DATABASE_NAME: ${DATABASE_NAME:-gandu}
      DATABASE_USER: ${DATABASE_USER:-dandu}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-dandu123}

      NODE_ENV: production
      PORT: 5000
      ENABLE_SWAGGER: ${ENABLE_SWAGGER:-false}
      CORS_ORIGINS: ${CORS_ORIGINS}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOKI_ENABLED: ${LOKI_ENABLED:-false}
      LOKI_URL: ${LOKI_URL:-http://loki:3100}

      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-${JWT_SECRET}}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-${JWT_SECRET}}
      REDIS_CACHE_KEY_PREFIX: ${REDIS_CACHE_KEY_PREFIX:-dandu}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}

      REDIS_HOST: redis-stack
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_USER: ${REDIS_USER:-default}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      REDIS_TLS: ${REDIS_TLS:-false}

      EMAIL_HOST: ${EMAIL_HOST:-smtp.gmail.com}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
      EMAIL_FROM: ${EMAIL_FROM:-${EMAIL_USER}}

      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}

      LINNWORKS_APPLICATION_ID: ${LINNWORKS_APPLICATION_ID}
      LINNWORKS_APPLICATION_SECRET: ${LINNWORKS_APPLICATION_SECRET}
      LINNWORKS_INSTALLATION_TOKEN: ${LINNWORKS_INSTALLATION_TOKEN}
      LINNWORKS_AUTH_TOKEN: ${LINNWORKS_AUTH_TOKEN}
      LINNWORKS_INSTALLATION_ID: ${LINNWORKS_INSTALLATION_ID}
      LINNWORKS_SESSION_TOKEN: ${LINNWORKS_SESSION_TOKEN}
      LINNWORKS_API_SERVER: ${LINNWORKS_API_SERVER:-https://api.linnworks.net}
    depends_on:
      mysql:
        condition: service_healthy
      redis-stack:
        condition: service_healthy
    networks:
      - app_network
